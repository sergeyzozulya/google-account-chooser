<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="color-scheme" content="light dark">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #fff;
      --text:       #202124;
      --text-med:   #3c4043;
      --text-low:   #5f6368;
      --text-muted: #80868b;
      --border:     #e8eaed;
      --hover:      #f1f3f4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg:         #2d2e31;
        --text:       #e8eaed;
        --text-med:   #bdc1c6;
        --text-low:   #9aa0a6;
        --text-muted: #80868b;
        --border:     #3c4043;
        --hover:      #3c4043;
      }
    }

    body {
      width: 300px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
    }

    header {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    header img { flex-shrink: 0; }

    header h1 {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
    }

    #options-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border: none;
      background: none;
      cursor: pointer;
      border-radius: 4px;
      padding: 0;
      flex-shrink: 0;
      color: var(--text-low);
    }

    #options-btn:hover { background: var(--hover); }

    /* Service menu */
    #service-menu {
      border-top: 1px solid var(--border);
      padding: 10px 0 4px;
    }

    /* Icons view */
    .svc-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(52px, 1fr));
      gap: 2px;
    }

    .svc-icon-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 7px 4px 6px;
      border: none;
      background: transparent;
      cursor: pointer;
      border-radius: 8px;
      color: var(--text-med);
    }

    .svc-icon-btn:hover { background: var(--hover); }

    .svc-icon-btn .ico { display: flex; align-items: center; justify-content: center; width: 24px; height: 24px; }

    .svc-group + .svc-group { margin-top: 4px; }

    .svc-group-label {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      padding: 4px 4px 10px 0;
    }

    .svc-group-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .svc-icon-btn .lbl {
      font-size: 10px;
      color: var(--text-low);
      margin-top: 10px;
      white-space: nowrap;
      overflow: hidden;
      max-width: 52px;
      text-overflow: ellipsis;
      text-align: center;
    }

  </style>
</head>
<body>
  <header>
    <img src="icons/icon.png" width="16" height="16" alt="">
    <h1>Google Account Chooser</h1>
    <button id="options-btn" title="Manage services &amp; popup settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
           stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="3"/>
        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33
                 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33
                 l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                 A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06
                 A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51
                 a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9
                 a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
      </svg>
    </button>
  </header>

  <!-- Populated by popup.js when services have menu:true -->
  <div id="service-menu" style="display:none;"></div>

  <script src="services-data.js"></script>
  <script src="popup.js"></script>
</body>
</html>
